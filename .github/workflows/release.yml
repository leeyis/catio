name: release

# 打 v* 标签即自动构建并发布 Windows 与 Ubuntu 客户端到 GitHub Release。
# macOS 不在 CI 中构建，需要的用户按 Release 说明从源码本地编译。
on:
  push:
    tags:
      - 'v*'

# tauri-action 需要写权限来创建 Release 并上传产物。
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows:固定 windows-2022(稳定 VS 2022)。windows-latest 现指向带 VS18 preview
          # 的镜像,其新版 MSVC 移除了 stdext::checked_array_iterator,导致 duckdb 捆绑的 fmt
          # 编译失败(error C2653 'stdext')。x64。仅打 NSIS(.exe):MSI 的 WiX light.exe
          # 在本地与 CI 均反复失败(与 duckdb 无关的 WiX 环境问题),而 NSIS 安装包已足够分发。
          - platform: windows-2022
            args: '--bundles nsis'
          # Ubuntu 22.04 是 WebKitGTK 4.1 可用的较低 glibc 构建基线。
          # 使用 GitHub 原生 x64/ARM64 runner，避免 QEMU 模拟构建缓慢且不稳定。
          - platform: ubuntu-22.04
            args: '--bundles deb'
          - platform: ubuntu-22.04-arm
            args: '--bundles deb'

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            src-tauri/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-release-
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install Tauri/Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev pkg-config libudev-dev \
            patchelf dpkg-dev xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tauri-action 会用 tauri.conf.json 的 version 替换 __VERSION__。
          tagName: ${{ github.ref_name }}
          releaseName: 'Catio v__VERSION__'
          releaseBody: |
            下载对应架构的安装包:Windows x64 使用 `.exe`;Ubuntu/Debian 使用
            `amd64.deb` 或 `arm64.deb`。

            ## Windows 未做代码签名

            SmartScreen 提示「Windows 已保护你的电脑」时,请点「更多信息」→「仍要运行」。

            ## macOS 本地构建

            Release 不提供 GitHub Actions 编译的 macOS 包。请在目标 Mac 上从源码构建:

            ```bash
            git clone --branch ${{ github.ref_name }} --depth 1 https://github.com/leeyis/catio.git
            cd catio
            npm ci
            npm run tauri build -- --bundles app
            # 产物: src-tauri/target/release/bundle/macos/Catio.app
            ```
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
